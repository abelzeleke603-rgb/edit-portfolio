<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editor Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 2px solid #3498db;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
        }
        h1 {
            color: #3498db;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #cccccc;
        }
        .skills-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .skill-item {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Creative Video Editor</h1>
        <p>I specialize in high-energy edits, cinematic lighting, and professional storytelling.</p>
        
        <ul class="skills-list">
            <li class="skill-item">Cinematic Lighting</li>
            <li class="skill-item">High-Energy Transitions</li>
            <li class="skill-item">Social Media Optimization</li>
            <li class="skill-item">Color Grading</li>
            <li class="skill-item">AI Image Integration</li>
            <li class="skill-item">Cat Meme Mastery</li>
        </ul>
    </div>

</body>
</html>
